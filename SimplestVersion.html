<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyper-Realistic Melting Ice Cube</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 50% 40%, #1a2c42 0%, #05080c 100%);
    overflow: hidden;
    perspective: 1400px;
  }

  /* SVG Filters for organic distortion (The secret to realistic ice & water edges) */
  .svg-filters {
    position: absolute;
    width: 0; height: 0;
    pointer-events: none;
  }

  /* 3D Scene Wrapper */
  .ice-container {
    position: relative;
    width: 240px;
    height: 240px;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
  }

  .ice-cube {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    animation: floatAndMelt 8s ease-in-out infinite;
  }

  /* --- HYPER-REALISTIC ICE FACES --- */
  .face {
    position: absolute;
    width: 240px;
    height: 240px;
    background: linear-gradient(135deg, 
      rgba(255, 255, 255, 0.45) 0%, 
      rgba(225, 242, 255, 0.15) 35%, 
      rgba(150, 200, 255, 0.05) 70%,
      rgba(255, 255, 255, 0.25) 100%
    );
    box-sizing: border-box;
    /* Uses SVG filter to warp the flat CSS borders into hand-carved, melting ice ridges */
    filter: url(#ice-deformation) drop-shadow(0 0 2px rgba(255,255,255,0.6));
    border: 1px solid rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(8px) saturate(130%);
    -webkit-backdrop-filter: blur(8px) saturate(130%);
    
    /* Complex internal light bounces */
    box-shadow: 
      inset 0 0 30px rgba(255, 255, 255, 0.85),
      inset -15px -15px 40px rgba(135, 200, 255, 0.4),
      inset 15px 12px 35px rgba(255, 255, 255, 0.5),
      inset 0 0 4px rgba(255,255,255,1);
  }

  /* Absolute 3D Plane Orientations */
  .front  { transform: rotateY(0deg) translateZ(120px); }
  .back   { transform: rotateY(180deg) translateZ(120px); }
  .right  { transform: rotateY(90deg) translateZ(120px); }
  .left   { transform: rotateY(-90deg) translateZ(120px); }
  .top    { transform: rotateX(90deg) translateZ(120px); }
  .bottom { transform: rotateX(-90deg) translateZ(120px); }

  /* --- ULTRA-BRIGHT SPECULAR SHINING SURFACES --- */
  .face::before {
    content: '';
    position: absolute;
    inset: 0;
    /* High-contrast flash reflections mimicking direct overhead studio light */
    background: 
      linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.85) 42%, rgba(255,255,255,0.95) 45%, transparent 52%),
      radial-gradient(circle at 15% 15%, rgba(255,255,255,0.7) 0%, transparent 35%);
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  /* Internal micro-fractures along edge rims */
  .face::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 2px dashed rgba(255, 255, 255, 0.4);
    filter: blur(2px) url(#ice-deformation);
    mix-blend-mode: screen;
  }

  /* --- FROSTY CLOUDY INNER CORE --- */
  .cloudy-core {
    position: absolute;
    top: 40px; left: 40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, 
      rgba(255, 255, 255, 0.95) 0%, 
      rgba(240, 250, 255, 0.6) 30%, 
      rgba(210, 235, 255, 0.2) 60%,
      transparent 80%
    );
    filter: blur(16px) url(#ice-deformation);
    transform: translateZ(0);
    animation: corePulse 6s ease-in-out infinite alternate;
    pointer-events: none;
  }

  /* --- DETAILED AIR BUBBLES --- */
  .bubbles-layer {
    position: absolute;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    pointer-events: none;
  }

  /* 3D Bubble Spheres with internal refraction gradients */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, 
      rgba(255, 255, 255, 1) 0%, 
      rgba(255, 255, 255, 0.4) 20%, 
      rgba(10, 30, 60, 0.1) 60%,
      rgba(255, 255, 255, 0.8) 90%
    );
    box-shadow: inset -1px -1px 2px rgba(0,0,0,0.2), 0 1px 2px rgba(255,255,255,0.6);
  }

  /* --- LIVE MELTING DROPS ON ICE SURFACE --- */
  .droplet-container {
    position: absolute;
    width: 100%; height: 100%;
    inset: 0;
    pointer-events: none;
  }

  .drop {
    position: absolute;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(2px);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 
      inset -1px -2px 3px rgba(0,0,0,0.15), 
      inset 1px 1px 2px rgba(255,255,255,0.8),
      0 2px 3px rgba(0,0,0,0.1);
    animation: dripDown linear infinite;
  }

  /* --- ORGANIC LIQUID PUDDLE --- */
  .water-puddle-container {
    position: absolute;
    bottom: -150px;
    left: 50%;
    transform: translateX(-50%) rotateX(85deg);
    width: 480px;
    height: 480px;
    pointer-events: none;
  }

  .water-puddle {
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, 
      rgba(255, 255, 255, 0.22) 0%, 
      rgba(157, 199, 237, 0.12) 40%, 
      rgba(6, 15, 28, 0.75) 65%,
      transparent 80%
    );
    filter: url(#puddle-distortion) blur(2px);
    box-shadow: 
      inset 0 0 40px rgba(255, 255, 255, 0.15),
      0 0 30px rgba(5, 9, 15, 0.9);
    border-radius: 50%;
  }

  /* Concentric reflection ripples expanding outward */
  .ripple {
    position: absolute;
    top: 50%; left: 50%;
    width: 10px; height: 10px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: rippleEffect 5s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
    filter: blur(1px);
  }

  /* --- PHYSIC ANIMATIONS --- */
  @keyframes floatAndMelt {
    0% { transform: translateY(0px) rotateX(-14deg) rotateY(22deg); }
    50% { transform: translateY(-8px) rotateX(-9deg) rotateY(32deg) scale(0.98); }
    100% { transform: translateY(0px) rotateX(-14deg) rotateY(22deg); }
  }

  @keyframes corePulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.9; filter: blur(15px) url(#ice-deformation); }
    100% { transform: scale(1.08) rotate(15deg); opacity: 0.75; filter: blur(18px) url(#ice-deformation); }
  }

  @keyframes dripDown {
    0% { transform: translateY(0) scaleY(1); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; transform: translateY(180px) scaleY(1.2); }
    100% { opacity: 0; transform: translateY(200px) scaleY(0.8); }
  }

  @keyframes rippleEffect {
    0% { width: 40px; height: 40px; opacity: 0; }
    10% { opacity: 0.4; }
    100% { width: 340px; height: 340px; opacity: 0; border-width: 0.5px; }
  }
</style>
</head>
<body>

<svg class="svg-filters">
  <defs>
    <filter id="ice-deformation">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="puddle-distortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<div class="water-puddle-container">
  <div class="water-puddle"></div>
  <div class="ripple" style="animation-delay: 0s;"></div>
  <div class="ripple" style="animation-delay: 1.5s;"></div>
  <div class="ripple" style="animation-delay: 3s;"></div>
</div>

<div class="ice-container" id="container">
  <div class="ice-cube" id="cube">
    <div class="cloudy-core"></div>
    
    <div class="bubbles-layer" id="bubbles"></div>

    <div class="droplet-container" id="drops-front"></div>
    <div class="droplet-container" id="drops-left" style="transform: rotateY(-90deg) translateZ(120px);"></div>

    <div class="face front"></div>
    <div class="face back"></div>
    <div class="face right"></div>
    <div class="face left"></div>
    <div class="face top"></div>
    <div class="face bottom"></div>
  </div>
</div>

<script>
  // --- PROCEDURAL GENERATION: SPECULAR AIR BUBBLES ---
  const bubbleLayer = document.getElementById('bubbles');
  const totalBubbles = 35;

  for (let i = 0; i < totalBubbles; i++) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    // Physical ice compression stretches bubbles near the center core vertically
    const width = Math.random() * 4 + 1.5;
    const height = width * (Math.random() * 0.6 + 1.2); 
    
    bubble.style.width = `${width}px`;
    bubble.style.height = `${height}px`;
    
    // Map out random distributions deep inside the 3D grid matrix
    const x = Math.random() * 160 + 40;
    const y = Math.random() * 160 + 40;
    const z = Math.random() * 180 - 90; 
    
    bubble.style.left = `${x}px`;
    bubble.style.top = `${y}px`;
    bubble.style.transform = `translateZ(${z}px) rotate(${Math.random() * 25}deg)`;
    bubble.style.opacity = Math.random() * 0.6 + 0.3;
    
    bubbleLayer.appendChild(bubble);
  }

  // --- PROCEDURAL GENERATION: RUNNING SURFACE DROPS ---
  function generateDroplets(containerId) {
    const target = document.getElementById(containerId);
    const dropCount = 4;
    
    for(let i=0; i < dropCount; i++) {
      const drop = document.createElement('div');
      drop.className = 'drop';
      
      const width = Math.random() * 5 + 3;
      drop.style.width = `${width}px`;
      drop.style.height = `${width * (Math.random() * 1.5 + 1.3)}px`;
      drop.style.left = `${Math.random() * 160 + 40}px`;
      
      // Desynchronize dripping speeds to mirror variable fluid friction
      drop.style.animationDuration = `${Math.random() * 3 + 3}s`;
      drop.style.animationDelay = `${Math.random() * 5}s`;
      
      target.appendChild(drop);
    }
  }
  generateDroplets('drops-front');

  // --- PARALLAX REFLECTION INTERACTION ---
  const container = document.getElementById('container');
  const cube = document.getElementById('cube');

  document.addEventListener('mousemove', (e) => {
    cube.style.animation = 'none'; // Overrides generic looping to prioritize sightline calculations
    
    const xAngle = (window.innerWidth / 2 - e.pageX) / 10;
    const yAngle = (window.innerHeight / 2 - e.pageY) / 10;
    
    container.style.transform = `rotateY(${xAngle}deg) rotateX(${-yAngle}deg)`;
  });

  document.addEventListener('mouseleave', () => {
    cube.style.animation = 'floatAndMelt 8s ease-in-out infinite';
    container.style.transform = 'rotateY(0deg) rotateX(0deg)';
  });
</script>

</body>
</html>
